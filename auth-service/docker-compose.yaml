services:
  db:
    container_name: auth_db
    image: postgres:15
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres123
      POSTGRES_DB: auth-db
    volumes:
      - "/home/krishna/Development/NexisDB/auth-db:/var/lib/postgresql/data"
  redis:
    container_name: auth_redis
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: Redis123
    volumes:
        - "/home/krishna/Development/NexisDB/redis-data:/data"
    command: redis-server --appendonly yes --requirepass Redis123


