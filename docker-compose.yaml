services:
  db:
    container_name: auth_db
    image: postgres:15
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres123
      POSTGRES_DB: auth-db
    volumes:
      - "/home/krishna/Development/NexisDB/auth-db:/var/lib/postgresql/data"
  redis:
    container_name: nexis_redis
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    volumes:
        - "/home/krishna/Development/NexisDB/redis-data:/data"
    command: redis-server --appendonly yes --requirepass Redis123
  rabbitmq:
    container_name: nexis_rabbitmq
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"    # AMQP - Spring Boot connects here
      - "15672:15672"  # Management UI — browser dashboard
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: Rabbitmq123


